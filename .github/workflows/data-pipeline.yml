name: Data Pipeline

on:
  schedule:
    # Source cadence: the ABS publishes international merchandise trade MONTHLY,
    # roughly five weeks after the reference month. Monthly cron matches it —
    # and monthly is the fastest cadence allowed. Day 9 at 04:23 UTC is staggered
    # off-hour so this repo doesn't fire alongside the rest of the fleet.
    - cron: '23 4 9 * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['pipeline/**']

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # `npm install`, not `npm ci`: the aggregate step shells out to npx
      # mapshaper, and there is no lockfile for that on-demand dependency.
      - run: cd pipeline && npm install
      - run: node pipeline/collect.mjs
      - run: node pipeline/aggregate.mjs
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "Update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || (git pull --rebase && git push)
